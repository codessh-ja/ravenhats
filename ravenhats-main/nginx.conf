# RavenHats — Nginx reverse proxy
# Ruta en el VPS: /etc/nginx/sites-available/ravenhats
# Activar con: ln -s /etc/nginx/sites-available/ravenhats /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name ravenhats.store www.ravenhats.store;

    # Redirigir todo HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ravenhats.store www.ravenhats.store;

    # Certificados SSL — generados con: certbot --nginx -d ravenhats.store -d www.ravenhats.store
    ssl_certificate     /etc/letsencrypt/live/ravenhats.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ravenhats.store/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Seguridad
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Archivos estáticos de Next.js — servir directo, sin pasar por Node
    location /_next/static/ {
        alias /var/www/ravenhats/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Imágenes y assets de /public — directo desde filesystem, sin Next.js
    # Esto hace que git pull actualice las imágenes sin necesitar rebuild
    location ~* \.(webp|jpg|jpeg|png|gif|svg|ico|woff2?|ttf|otf|mp4|pdf)$ {
        root /var/www/ravenhats/public;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header Vary "Accept-Encoding";
        access_log off;
        try_files $uri @nextjs;
    }

    location @nextjs {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Todo lo demás → Next.js en puerto 3001
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Límite de tamaño para subida de imágenes en el admin
    client_max_body_size 10M;
}
